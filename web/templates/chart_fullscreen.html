<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart — Fullscreen</title>
  <link href="https://cdn.syncfusion.com/ej2/29.1.33/material.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: #f8f8f8; font-family: system-ui, sans-serif; }
    .chart-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #ddd; background: #fff; }
    .chart-header a { color: #1a1a1a; }
    .chart-filters { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 20px; }
    .chart-filters label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
    .chart-container { flex: 1; min-height: 0; padding: 16px; }
  </style>
</head>
<body>
  <div class="chart-header">
    <form id="chart-filter-form" class="chart-filters" method="get" action="#" onsubmit="return false;">
      <input type="hidden" name="start_date" value="{{ start_date }}">
      <input type="hidden" name="end_date" value="{{ end_date }}">
      <input type="hidden" name="n" value="{{ n }}">
      <span><strong>Chart:</strong> filter by operator (none = all)</span>
      {% for op in operators %}
      <label><input type="checkbox" name="chart_operator" value="{{ op }}" {% if op in chart_operators_selected %}checked{% endif %}> {{ op }}</label>
      {% endfor %}
    </form>
    <span class="chart-hint" style="font-size: 0.85rem; color: #666;">Zoom toolbar: zoom, pan, reset.</span>
    <a href="#" onclick="window.close(); return false;">Close</a>
  </div>
  <div class="chart-container">
    <div id="winsChart" style="width:100%; height:100%; min-height:360px;"></div>
  </div>
  <script src="https://cdn.syncfusion.com/ej2/29.1.33/dist/ej2.min.js"></script>
  <script>
    if (typeof ej !== 'undefined' && ej.base && ej.base.registerLicense) {
      ej.base.registerLicense('Ngo9BigBOggjHTQxAR8/V1JGaF1cXmhKYVJzWmFZfVhgdV9EZVZVR2YuP1ZhSXxVdkZjUX9fcnFRRWNbU0R9XEA=');
    }
  </script>
  <script type="module">
import { QueryClient } from 'https://esm.sh/@tanstack/query-core@5';

var queryClient = new QueryClient({
  defaultOptions: {
    queries: { staleTime: 5 * 60 * 1000 }
  }
});

var colors = [
  '#2c3e50', '#34495e', '#7f8c8d', '#95a5a6', '#1a1a1a',
  '#0a6b0a', '#2d6a2d', '#4a7c4a', '#27ae60', '#16a085',
  '#2980b9', '#3498db', '#5d6d7e', '#566573', '#273746',
  '#1a5276', '#0e6655', '#186a3b', '#7d6608', '#5d4e37',
  '#784212', '#6e2c00', '#922b21', '#641e16', '#1b4f72',
  '#154360', '#0e6251', '#145a32', '#7e5109', '#6e2c00'
];
if (typeof ej !== 'undefined' && ej.charts && ej.charts.Chart && ej.charts.Chart.Inject) {
  ej.charts.Chart.Inject(ej.charts.StackingColumnSeries, ej.charts.Category, ej.charts.Legend, ej.charts.Zoom, ej.charts.Tooltip);
}
var chartInstance = null;
function buildSeries(d) {
    if (!d || !d.labels || !d.datasets || !d.datasets.length) return [];
    var labels = d.labels;
    return d.datasets.map(function(s, i) {
      var dataSource = labels.map(function(month, j) {
        return { x: month, y: (s.counts && s.counts[j]) || 0 };
      });
      return {
        type: 'StackingColumn',
        dataSource: dataSource,
        xName: 'x',
        yName: 'y',
        name: s.number || ('Series ' + (i + 1)),
        fill: colors[i % colors.length]
      };
    });
  }
  function drawChart(d) {
    if (!d || !d.datasets || !d.datasets.length) return;
    var container = document.getElementById('winsChart');
    if (!container) return;
    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }
    container.innerHTML = '';
    var series = buildSeries(d);
    var filterLabel = (d.filter_label != null && d.filter_label !== '') ? d.filter_label : 'All operators';
    var chartTitle = 'Top ' + series.length + ' numbers: ' + filterLabel;
    chartInstance = new ej.charts.Chart({
      title: chartTitle,
      primaryXAxis: { valueType: 'Category', title: 'Month' },
      primaryYAxis: { title: 'Wins' },
      series: series,
      legendSettings: { visible: true, position: 'Bottom' },
      tooltip: { enable: true },
      zoomSettings: {
        enableMouseWheelZooming: true,
        enablePinchZooming: true,
        enableSelectionZooming: true,
        enablePan: true,
        mode: 'X',
        showToolbar: true,
        toolbarItems: ['Zoom', 'ZoomIn', 'ZoomOut', 'Pan', 'Reset']
      }
    });
    chartInstance.appendTo('#winsChart');
  }
  function applyChartData(d) {
    if (!d || !d.datasets || !d.datasets.length) return;
    drawChart(d);
  }
  async function fetchChart() {
    var form = document.getElementById('chart-filter-form');
    if (!form) return;
    var fd = new FormData(form);
    var urlParams = new URLSearchParams(window.location.search);
    var params = new URLSearchParams();
    params.set('start_date', fd.get('start_date') || urlParams.get('start_date') || '');
    params.set('end_date', fd.get('end_date') || urlParams.get('end_date') || '');
    params.set('n', fd.get('n') || urlParams.get('n') || '24');
    var ops = fd.getAll('chart_operator');
    if (ops.length) ops.forEach(function(v) { params.append('chart_operator', v); });
    var url = '/api/chart?' + params.toString();
    try {
      var d = await queryClient.fetchQuery({
        queryKey: ['chart', params.toString()],
        queryFn: function() { return fetch(url).then(function(r) { return r.json(); }); },
        staleTime: 5 * 60 * 1000
      });
      applyChartData(d);
    } catch (e) {}
  }
  fetchChart();
  var form = document.getElementById('chart-filter-form');
  if (form) {
    form.addEventListener('change', function(ev) {
      if (ev.target && ev.target.getAttribute('name') === 'chart_operator') fetchChart();
    });
  }
  </script>
</body>
</html>
